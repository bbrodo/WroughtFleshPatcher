name: Build Release Zip

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Zip release files
        run: |
          cd dist
          cd release
          zip -r "../WroughtFleshPatcher${{ github.ref_name }}.zip" .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" "WroughtFleshPatcher${{ github.ref_name }}.zip" \
            --title "${{ github.ref_name }}" \
            --notes "Automated release for ${{ github.ref_name }}"